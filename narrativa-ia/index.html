<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narrativa IA — Studio</title>
<meta name="description" content="Transforme ideias em histórias cinematográficas com inteligência artificial.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Geist', system-ui, sans-serif;
  background: #05050E;
  color: #EEEEF8;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.aurora {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 100% 60% at 10% 30%, rgba(98,20,255,0.13) 0%, transparent 58%),
    radial-gradient(ellipse 70% 55% at 88% 10%, rgba(65,105,255,0.08) 0%, transparent 52%),
    radial-gradient(ellipse 55% 65% at 60% 90%, rgba(124,92,248,0.07) 0%, transparent 50%);
}
@keyframes orb1 { 0%,100%{transform:translate(0,0) scale(1);opacity:.6} 33%{transform:translate(3%,-6%) scale(1.08);opacity:.9} 66%{transform:translate(-2%,4%) scale(.93);opacity:.5} }
@keyframes orb2 { 0%,100%{transform:translate(0,0) scale(1);opacity:.45} 50%{transform:translate(-5%,6%) scale(1.12);opacity:.75} }
.orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; will-change: transform; }
.orb-1 { top: -30vh; left: -20vw; width: 85vw; height: 85vh; background: radial-gradient(ellipse, rgba(98,20,255,.16) 0%, transparent 65%); animation: orb1 26s ease-in-out infinite; }
.orb-2 { bottom: -25vh; right: -15vw; width: 70vw; height: 70vh; background: radial-gradient(ellipse, rgba(65,105,255,.10) 0%, transparent 65%); animation: orb2 32s ease-in-out infinite; }

.grid-lines {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(98,20,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(98,20,255,.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 80%);
}

.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 14px 40px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(5,5,14,.75);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,.05);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-icon { height: 28px; width: auto; filter: drop-shadow(0 0 8px rgba(98,20,255,.5)); }
.topbar-name { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; color: rgba(238,238,248,.55); }
.topbar-badge {
  font-family: 'Geist Mono', monospace;
  font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  color: #C4B1FF; padding: 4px 14px;
  background: rgba(98,20,255,.1); border: 1px solid rgba(98,20,255,.25);
  border-radius: 20px;
}

.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 120px 24px 80px;
}

.login-wrap {
  width: 100%; max-width: 400px;
  background: rgba(10,10,20,.92);
  border: 1px solid rgba(124,92,248,.2);
  border-radius: 22px;
  padding: 44px 40px;
  box-shadow: 0 0 60px rgba(98,52,226,.1), 0 24px 48px rgba(0,0,0,.5);
  position: relative;
}
.login-wrap::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, rgba(98,20,255,.9) 0%, rgba(65,105,255,.4) 50%, transparent 80%);
  border-radius: 22px 22px 0 0;
}

.logo-row {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 10px;
}
.logo-icon-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
.logo-glow {
  position: absolute; inset: 0; border-radius: 50%;
  background: #6234E2; filter: blur(18px); opacity: .4; transform: scale(1.15);
}
.logo-icon { position: relative; width: 44px; height: 44px; object-fit: contain; }
.logo-text-wrap { text-align: left; }
.logo-text {
  display: flex; align-items: center; gap: 5px;
}
.logo-text .n { color: #fff; font-weight: 800; font-size: 17px; letter-spacing: 2px; }
.logo-text .ia {
  background: linear-gradient(135deg,#9b7fff,#4169ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  font-weight: 800; font-size: 17px; letter-spacing: 2px;
}
.logo-version { color: rgba(255,255,255,.18); font-size: 9px; text-transform: uppercase; letter-spacing: .18em; margin-top: 2px; }
.login-sub { text-align: center; color: rgba(255,255,255,.3); font-size: 13px; margin: 0 0 32px; line-height: 1.5; }

.f-label {
  display: block; color: rgba(255,255,255,.4); font-size: 10px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; margin-bottom: 7px;
}
.f-input {
  width: 100%;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(124,92,248,.22);
  border-radius: 11px; padding: 12px 15px;
  color: #eeeef8; font-family: 'Geist', sans-serif; font-size: 14px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.f-input:focus {
  border-color: rgba(124,92,248,.55);
  box-shadow: 0 0 0 3px rgba(98,20,255,.1);
}
.f-group { margin-bottom: 16px; }

.btn-login {
  width: 100%; margin-top: 4px;
  background: linear-gradient(135deg,#6234e2,#4169ff);
  border: none; border-radius: 11px;
  padding: 13px; color: #fff;
  font-family: 'Geist', sans-serif;
  font-weight: 700; font-size: 14px; letter-spacing: .5px;
  cursor: pointer; transition: opacity .2s, transform .15s, box-shadow .2s;
  box-shadow: 0 4px 20px rgba(98,20,255,.4);
}
.btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(98,20,255,.55); }
.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.login-error {
  background: rgba(244,63,94,.08); border: 1px solid rgba(244,63,94,.3);
  border-radius: 9px; padding: 10px 14px;
  color: #f87171; font-size: 13px; font-weight: 500;
  margin-top: 10px; display: none;
}
.login-error.visible { display: block; }

.login-footer {
  text-align: center; color: rgba(255,255,255,.12);
  font-size: 11px; margin-top: 28px; line-height: 1.6;
}

.particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; border-radius: 50%;
  background: rgba(98,20,255,.4);
  animation: pfloat linear infinite;
}
@keyframes pfloat {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  8%   { opacity: 1; }
  92%  { opacity: 1; }
  100% { transform: translateY(-8vh) scale(1.2); opacity: 0; }
}

@media (max-width: 540px) {
  .topbar { padding: 12px 20px; }
  .topbar-name { display: none; }
  .login-wrap { padding: 32px 24px; }
}
</style>
</head>
<body>

<div class="aurora"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="grid-lines"></div>
<div class="particles" id="particles"></div>

<header class="topbar">
  <div class="topbar-left">
    <img src="/embreve/narrativa-icon.png" alt="Narrativa IA" class="topbar-icon">
    <span class="topbar-name">Narrativa IA Studio</span>
  </div>
  <div class="topbar-badge">Acesso Restrito</div>
</header>

<main class="page">
  <div class="login-wrap">

    <div class="logo-row">
      <div class="logo-icon-wrap">
        <div class="logo-glow"></div>
        <img src="/embreve/narrativa-icon.png" alt="Narrativa IA" class="logo-icon">
      </div>
      <div class="logo-text-wrap">
        <div class="logo-text">
          <span class="n">NARRATIVA</span>
          <span class="ia">IA</span>
        </div>
        <div class="logo-version">Studio · v8.7</div>
      </div>
    </div>

    <p class="login-sub">Entre com seus dados para acessar</p>

    <div class="f-group">
      <label class="f-label">Email</label>
      <input class="f-input" type="email" id="email-input" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="f-group">
      <label class="f-label">Senha</label>
      <input class="f-input" type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="login-error" id="login-error"></div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">Entrar →</button>

    <p class="login-footer">Acesso restrito · apenas usuários autorizados</p>
  </div>
</main>

<script>
(function() {
  const wrap = document.getElementById('particles');
  const n = window.innerWidth < 600 ? 8 : 16;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = 1.5 + Math.random() * 3;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${14+Math.random()*22}s;animation-delay:${Math.random()*20}s;opacity:${.15+Math.random()*.35};`;
    wrap.appendChild(p);
  }
})();

['email-input', 'pw-input'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
);

async function doLogin() {
  const email    = document.getElementById('email-input').value.trim();
  const password = document.getElementById('pw-input').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('login-error');

  errEl.classList.remove('visible');

  if (!email || !password) {
    showError('Preencha email e senha.');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Entrando...';

  try {
    const res  = await fetch('/api/admin', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ action: 'narrativa-login', email, password }),
    });
    const data = await res.json();

    if (res.ok && data.ok) {
      if (data.redirect) {
        btn.textContent = 'Redirecionando...';
        window.location.href = data.redirect;
      } else {
        showError('Credenciais corretas! O studio está sendo atualizado — tente novamente em breve.');
        btn.disabled    = false;
        btn.textContent = 'Entrar →';
      }
    } else {
      showError(data.error || 'Email ou senha incorretos.');
      btn.disabled    = false;
      btn.textContent = 'Entrar →';
    }
  } catch {
    showError('Erro de conexão. Tente novamente.');
    btn.disabled    = false;
    btn.textContent = 'Entrar →';
  }
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('visible');
}
</script>
</body>
</html>
