<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CenaDrop Flow — Admin 2.1</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:  #00ff88;
      --yellow: #ffee00;
      --red:    #ff3333;
      --silver: #c8d0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; min-height: 100vh; }

    /* ── LOGIN ── */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(ellipse at 50% 0%, rgba(0,255,136,0.04) 0%, #050505 60%); }
    .login-box { background: #080808; border: 1px solid #111; border-radius: 20px; padding: 44px; width: 400px; box-shadow: 0 0 60px rgba(0,255,136,0.06), 0 0 120px rgba(0,255,136,0.02); position: relative; overflow: hidden; }
    .login-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,255,136,0.3), rgba(255,238,0,0.2), transparent); }

    .login-logo { text-align: center; margin-bottom: 36px; }
    .login-logo .icon { width: 64px; height: 64px; background: #0a0a0a; border: 1px solid rgba(0,255,136,0.25); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; box-shadow: 0 0 24px rgba(0,255,136,0.15); }
    .login-logo .icon span { font-family: 'JetBrains Mono',monospace; font-size: 16px; font-weight: 600; color: var(--green); text-shadow: 0 0 12px rgba(0,255,136,0.8); }
    .login-logo .brand { font-size: 22px; font-weight: 900; }
    .login-logo .brand .g { color: var(--green); text-shadow: 0 0 12px rgba(0,255,136,0.5); }
    .login-logo .ver { font-size: 11px; font-weight: 700; color: var(--yellow); letter-spacing: 3px; margin-top: 5px; text-shadow: 0 0 8px rgba(255,238,0,0.5); }
    .login-logo .tag { font-size: 11px; color: #2a2a2a; font-style: italic; margin-top: 8px; }

    /* ── APP ── */
    .app { display: none; }
    .topbar { background: #050505; border-bottom: 1px solid #0d0d0d; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,255,136,0.15), rgba(255,238,0,0.1), transparent); }
    .topbar-brand { font-size: 16px; font-weight: 900; }
    .topbar-brand .g { color: var(--green); text-shadow: 0 0 10px rgba(0,255,136,0.5); }
    .topbar-brand .sub { font-size: 10px; color: #222; font-weight: 400; margin-left: 8px; font-family: 'JetBrains Mono',monospace; letter-spacing: 1px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .badge-total { font-family: 'JetBrains Mono',monospace; font-size: 11px; padding: 4px 12px; background: rgba(0,255,136,0.06); border: 1px solid rgba(0,255,136,0.2); color: var(--green); border-radius: 6px; text-shadow: 0 0 8px rgba(0,255,136,0.4); }

    .main { padding: 28px; max-width: 1300px; margin: 0 auto; }

    /* ── STAT CARDS ── */
    .cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 30px; }
    .card { background: #080808; border: 1px solid #111; border-radius: 14px; padding: 22px; position: relative; overflow: hidden; transition: border-color .2s; }
    .card:hover { border-color: rgba(0,255,136,0.15); }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,255,136,0.2), transparent); }
    .card-icon { font-size: 20px; margin-bottom: 10px; opacity: 0.6; }
    .card-val { font-size: 38px; font-weight: 900; line-height: 1; }
    .card-val.green  { color: var(--green);  text-shadow: 0 0 20px rgba(0,255,136,0.4); }
    .card-val.yellow { color: var(--yellow); text-shadow: 0 0 20px rgba(255,238,0,0.4); }
    .card-val.silver { color: var(--silver); }
    .card-lbl { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #222; margin-top: 6px; }

    /* ── SECTION ── */
    .sect-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .sect-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--green); text-shadow: 0 0 8px rgba(0,255,136,0.4); }
    .sect-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(0,255,136,0.15), transparent); }

    /* ── INPUTS ── */
    input[type=text], input[type=password], input[type=number], input[type=email] {
      background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff;
      padding: 11px 14px; border-radius: 10px; font-size: 13px; font-family: 'Inter',sans-serif;
      outline: none; transition: all .2s;
    }
    input:focus { border-color: rgba(0,255,136,0.35); box-shadow: 0 0 0 3px rgba(0,255,136,0.05); }
    input::placeholder { color: #1e1e1e; }

    /* ── BUTTONS ── */
    .btn { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: 'Inter',sans-serif; cursor: pointer; border: none; transition: all .2s; }
    .btn-green { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: var(--green); text-shadow: 0 0 8px rgba(0,255,136,0.4); }
    .btn-green:hover { background: rgba(0,255,136,0.15); box-shadow: 0 0 20px rgba(0,255,136,0.15); }
    .btn-outline { background: transparent; border: 1px solid #1a1a1a; color: #333; }
    .btn-outline:hover { border-color: rgba(0,255,136,0.2); color: var(--green); }
    .btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 7px; }
    .btn-login { width: 100%; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 700; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: var(--green); cursor: pointer; transition: all .2s; font-family: 'Inter',sans-serif; text-shadow: 0 0 10px rgba(0,255,136,0.5); }
    .btn-login:hover { background: rgba(0,255,136,0.16); box-shadow: 0 0 30px rgba(0,255,136,0.15); }

    /* ── CREATE ROW ── */
    .create-row { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; align-items: center; }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #0d0d0d; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #080808; }
    thead th { text-align: left; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #222; padding: 12px 16px; border-bottom: 1px solid #0d0d0d; }
    tbody tr { border-bottom: 1px solid #080808; transition: background .1s; }
    tbody tr:hover { background: #0a0a0a; }
    tbody td { padding: 12px 16px; font-size: 12px; vertical-align: middle; }
    .key-cell { font-family: 'JetBrains Mono',monospace; font-size: 12px; color: var(--green); text-shadow: 0 0 8px rgba(0,255,136,0.3); letter-spacing: 0.5px; }
    .dev-cell { font-family: 'JetBrains Mono',monospace; font-size: 10px; color: #1e1e1e; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dev-cell.linked { color: var(--yellow); text-shadow: 0 0 6px rgba(255,238,0,0.3); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
    .badge-active   { background: rgba(0,255,136,0.07); color: var(--green); border: 1px solid rgba(0,255,136,0.2); text-shadow: 0 0 6px rgba(0,255,136,0.3); }
    .badge-inactive { background: rgba(255,51,51,0.07); color: var(--red);   border: 1px solid rgba(255,51,51,0.2); }
    .date-cell { font-family: 'JetBrains Mono',monospace; font-size: 10px; color: #222; white-space: nowrap; }
    .actions { display: flex; gap: 5px; flex-wrap: wrap; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #0a0a0a; border: 1px solid #1a1a1a; color: #555; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 1000; }
    .toast.show { opacity: 1; }
    .toast.success { border-color: rgba(0,255,136,0.3); color: var(--green); box-shadow: 0 0 20px rgba(0,255,136,0.08); }
    .toast.error   { border-color: rgba(255,51,51,0.3); color: var(--red); }
    .toast.warn    { border-color: rgba(255,238,0,0.3); color: var(--yellow); }

    .error-msg { color: var(--red); font-size: 12px; margin-top: 10px; min-height: 18px; font-weight: 500; }
    .sep { height: 1px; background: linear-gradient(90deg, rgba(0,255,136,0.08), transparent); margin: 28px 0; }
    .filter-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .filter-row input { flex: 1; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon"><span>CD</span></div>
      <div class="brand">CenaDrop <span class="g">Flow</span></div>
      <div class="ver">2.1v</div>
      <div class="tag">Crie mais. Clique menos.</div>
    </div>
    <input type="password" id="loginPass" placeholder="Senha de acesso" style="width:100%;margin-bottom:12px;" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">→ Entrar no Painel</button>
    <div class="error-msg" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div>
      <span class="topbar-brand">CenaDrop <span class="g">Flow</span></span>
      <span class="topbar-brand"><span class="sub">— ADMIN PANEL</span></span>
    </div>
    <div class="topbar-right">
      <span class="badge-total" id="badgeTotal">0 licenças</span>
      <button class="btn btn-outline btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="main">

    <!-- STATS -->
    <div class="cards">
      <div class="card">
        <div class="card-icon">🔑</div>
        <div class="card-val silver" id="statTotal">0</div>
        <div class="card-lbl">Total de Licenças</div>
      </div>
      <div class="card">
        <div class="card-icon">✅</div>
        <div class="card-val green" id="statActive">0</div>
        <div class="card-lbl">Ativas</div>
      </div>
      <div class="card">
        <div class="card-icon">🚫</div>
        <div class="card-val yellow" id="statInactive">0</div>
        <div class="card-lbl">Desativadas</div>
      </div>
    </div>

    <!-- CREATE -->
    <div class="sect-head">
      <div class="sect-title">Gerar Licenças</div>
      <div class="sect-line"></div>
    </div>
    <div class="create-row">
      <input type="number" id="createQty"   placeholder="Qtd" value="1" min="1" max="50" style="width:80px;">
      <input type="email"  id="createEmail" placeholder="Email do cliente (opcional)" style="flex:1;min-width:160px;">
      <input type="text"   id="createNote"  placeholder="Observação (opcional)" style="flex:1;min-width:160px;">
      <button class="btn btn-green" onclick="createLicenses()">＋ Gerar</button>
    </div>

    <div class="sep"></div>

    <!-- TABLE -->
    <div class="sect-head">
      <div class="sect-title">Licenças</div>
      <div class="sect-line"></div>
    </div>
    <div class="filter-row">
      <input type="text" id="filterInput" placeholder="Buscar por chave, email ou observação..." oninput="renderTable()">
      <button class="btn btn-outline btn-sm" onclick="loadLicenses()">↻ Atualizar</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Chave</th>
            <th>Email</th>
            <th>Obs.</th>
            <th>Status</th>
            <th>Dispositivo</th>
            <th>Último uso</th>
            <th>Criada</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_BASE = window.location.origin;
  let adminPassword = '', licenses = [];

  async function login() {
    const pass = document.getElementById('loginPass').value;
    if (!pass) return;
    document.getElementById('loginErr').textContent = '';
    const r = await api('list', { password: pass });
    if (r.error === 'Senha incorreta') { document.getElementById('loginErr').textContent = '❌ Senha incorreta'; return; }
    adminPassword = pass;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    licenses = r.licenses || [];
    updateStats(); renderTable();
  }

  function logout() {
    adminPassword = '';
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginPass').value = '';
  }

  async function api(action, extra = {}) {
    try {
      const r = await fetch(`${API_BASE}/api/admin`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: adminPassword, action, ...extra })
      });
      return await r.json();
    } catch(e) { return { error: e.message }; }
  }

  async function loadLicenses() {
    const r = await api('list');
    if (r.error) { showToast(r.error, 'error'); return; }
    licenses = r.licenses || []; updateStats(); renderTable();
  }

  function updateStats() {
    const total  = licenses.length;
    const active = licenses.filter(l => l.active).length;
    document.getElementById('statTotal').textContent    = total;
    document.getElementById('statActive').textContent   = active;
    document.getElementById('statInactive').textContent = total - active;
    document.getElementById('badgeTotal').textContent   = total + ' licença' + (total !== 1 ? 's' : '');
  }

  function renderTable() {
    const q = (document.getElementById('filterInput').value || '').toLowerCase();
    const list = q ? licenses.filter(l => l.key?.toLowerCase().includes(q) || l.email?.toLowerCase().includes(q) || l.note?.toLowerCase().includes(q)) : licenses;
    document.getElementById('tableBody').innerHTML = list.map(l => `
      <tr>
        <td class="key-cell">${l.key}</td>
        <td style="color:#555">${l.email || '—'}</td>
        <td style="color:#333;font-size:11px">${l.note || '—'}</td>
        <td><span class="badge ${l.active ? 'badge-active' : 'badge-inactive'}">${l.active ? 'ATIVA' : 'INATIVA'}</span></td>
        <td class="dev-cell ${l.device_id ? 'linked' : ''}" title="${l.device_id||''}">${l.device_id ? '🔗 '+l.device_id.substring(0,8)+'...' : '—'}</td>
        <td class="date-cell">${l.used_at ? fmtDate(l.used_at) : '—'}</td>
        <td class="date-cell">${fmtDate(l.created_at)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-outline btn-sm" onclick="copyKey('${l.key}')">Copiar</button>
            <button class="btn btn-outline btn-sm" onclick="toggleLicense('${l.key}')">${l.active ? 'Desativar' : 'Ativar'}</button>
            ${l.device_id ? `<button class="btn btn-outline btn-sm" style="color:var(--yellow);border-color:#1a1500" onclick="resetDevice('${l.key}')" title="Libera para outro dispositivo">↺ Disp.</button>` : ''}
            <button class="btn btn-outline btn-sm" style="color:var(--red);border-color:#1a0000" onclick="deleteLicense('${l.key}')">✕</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function createLicenses() {
    const qty   = parseInt(document.getElementById('createQty').value) || 1;
    const email = document.getElementById('createEmail').value.trim();
    const note  = document.getElementById('createNote').value.trim();
    const r = await api('create', { quantity: qty, email, note });
    if (r.error) { showToast(r.error, 'error'); return; }
    showToast(`✅ ${r.created.length} chave(s) gerada(s)!`, 'success');
    await loadLicenses();
  }

  async function toggleLicense(key) {
    const r = await api('toggle', { key });
    if (r.error) { showToast(r.error, 'error'); return; }
    showToast(r.active ? '✅ Ativada' : '🚫 Desativada', r.active ? 'success' : 'error');
    await loadLicenses();
  }

  async function resetDevice(key) {
    if (!confirm(`Resetar dispositivo da licença ${key}?`)) return;
    const r = await api('reset_device', { key });
    if (r.error) { showToast(r.error, 'error'); return; }
    showToast('↺ Dispositivo resetado!', 'warn');
    await loadLicenses();
  }

  async function deleteLicense(key) {
    if (!confirm(`Deletar ${key}?`)) return;
    const r = await api('delete', { key });
    if (r.error) { showToast(r.error, 'error'); return; }
    showToast('🗑 Deletada', 'error');
    await loadLicenses();
  }

  function copyKey(key) { navigator.clipboard.writeText(key); showToast('📋 Copiado!', 'success'); }

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }
</script>
</body>
</html>
