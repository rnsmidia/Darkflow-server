<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DarkFlow — Painel Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0505; color: #f0e0e0; min-height: 100vh; }

    /* ── LOGIN ── */
    .login-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #130808; border: 1px solid #3a0000;
      border-radius: 14px; padding: 40px; width: 360px;
      box-shadow: 0 0 60px rgba(200,0,0,0.15);
    }
    .login-logo {
      text-align: center; margin-bottom: 28px;
    }
    .login-logo .brand {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(90deg, #ff3333, #cc0000);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .login-logo .sub { font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

    /* ── APP ── */
    .app { display: none; }
    .topbar {
      background: #130808; border-bottom: 1px solid #2a0000;
      padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-brand { font-size: 16px; font-weight: 700; }
    .topbar-brand span {
      background: linear-gradient(90deg, #ff3333, #cc0000);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .badge-total {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; padding: 4px 10px;
      background: rgba(200,0,0,0.12); border: 1px solid rgba(200,0,0,0.3);
      color: #ff4444; border-radius: 5px;
    }

    .main { padding: 28px; max-width: 1100px; margin: 0 auto; }

    /* ── CARDS ── */
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
    .card {
      background: #130808; border: 1px solid #2a0000;
      border-radius: 10px; padding: 18px 20px;
    }
    .card-val { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #ff3333, #990000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card-val.green { background: linear-gradient(135deg, #ff6666, #44dd44); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card-val.gray  { background: linear-gradient(135deg, #888, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card-lbl { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #444; margin-top: 4px; }

    /* ── CREATE SECTION ── */
    .section-title { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #882222; margin-bottom: 10px; }
    .create-row { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }

    /* ── INPUTS ── */
    input[type=text], input[type=password], input[type=number], input[type=email] {
      background: #0e0505; border: 1px solid #2a0000;
      color: #f0e0e0; padding: 9px 12px; border-radius: 7px;
      font-size: 13px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color .2s;
    }
    input:focus { border-color: rgba(200,0,0,0.5); }
    input::placeholder { color: #442222; }

    /* ── BUTTONS ── */
    .btn {
      padding: 9px 18px; border-radius: 7px; font-size: 13px; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer; border: none; transition: all .2s;
    }
    .btn-red {
      background: linear-gradient(135deg, #cc0000, #990000);
      color: #fff; box-shadow: 0 0 16px rgba(200,0,0,0.3);
    }
    .btn-red:hover { box-shadow: 0 0 28px rgba(200,0,0,0.5); }
    .btn-outline {
      background: transparent; border: 1px solid #2a0000; color: #884444;
    }
    .btn-outline:hover { border-color: rgba(200,0,0,0.4); color: #ff4444; }
    .btn-sm { padding: 5px 12px; font-size: 11px; }
    .btn-login {
      width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 700;
      background: linear-gradient(135deg, #cc0000, #880000);
      color: #fff; border: none; cursor: pointer;
      box-shadow: 0 0 20px rgba(200,0,0,0.3); transition: all .2s; font-family: 'Inter', sans-serif;
    }
    .btn-login:hover { box-shadow: 0 0 32px rgba(200,0,0,0.5); }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; font-size: 10px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase; color: #553333;
      padding: 10px 14px; border-bottom: 1px solid #1e0000;
    }
    tbody tr { border-bottom: 1px solid #130808; transition: background .1s; }
    tbody tr:hover { background: #150909; }
    tbody td { padding: 11px 14px; font-size: 12px; vertical-align: middle; }
    .key-cell {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: #ff6666; letter-spacing: 0.5px;
    }
    .badge {
      display: inline-block; padding: 3px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    }
    .badge-active { background: rgba(0,180,0,0.12); color: #44dd44; border: 1px solid rgba(0,180,0,0.2); }
    .badge-inactive { background: rgba(180,0,0,0.12); color: #ff4444; border: 1px solid rgba(180,0,0,0.2); }
    .date-cell { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #553333; }
    .actions { display: flex; gap: 6px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1a0808; border: 1px solid #440000;
      color: #ff6666; padding: 12px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity .3s; pointer-events: none;
      z-index: 1000;
    }
    .toast.show { opacity: 1; }
    .toast.success { border-color: #004400; color: #44dd44; background: #081208; }

    .error-msg { color: #ff4444; font-size: 12px; margin-top: 8px; min-height: 18px; }
    .sep { height: 1px; background: #1a0505; margin: 20px 0; }
    .filter-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; }
    .filter-row input { flex: 1; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">DarkFlow Unlimited</div>
      <div class="sub">Painel Admin</div>
    </div>
    <input type="password" id="loginPass" placeholder="Senha de acesso" style="width:100%;margin-bottom:10px;" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">Entrar</button>
    <div class="error-msg" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-brand">DarkFlow <span>UNLIMITED</span> — Admin</div>
    <div class="topbar-right">
      <span class="badge-total" id="badgeTotal">0 licenças</span>
      <button class="btn btn-outline btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="main">

    <!-- STATS -->
    <div class="cards">
      <div class="card">
        <div class="card-val" id="statTotal">0</div>
        <div class="card-lbl">Total de Licenças</div>
      </div>
      <div class="card">
        <div class="card-val green" id="statActive">0</div>
        <div class="card-lbl">Ativas</div>
      </div>
      <div class="card">
        <div class="card-val gray" id="statInactive">0</div>
        <div class="card-lbl">Desativadas</div>
      </div>
    </div>

    <!-- CRIAR LICENÇAS -->
    <div class="section-title">Gerar Licenças</div>
    <div class="create-row">
      <input type="number" id="createQty"   placeholder="Quantidade" value="1" min="1" max="50" style="width:110px;">
      <input type="email"  id="createEmail" placeholder="Email do cliente (opcional)" style="flex:1;min-width:180px;">
      <input type="text"   id="createNote"  placeholder="Observação (opcional)" style="flex:1;min-width:180px;">
      <button class="btn btn-red" onclick="createLicenses()">＋ Gerar</button>
    </div>

    <div class="sep"></div>

    <!-- TABELA -->
    <div class="section-title">Licenças</div>
    <div class="filter-row">
      <input type="text" id="filterInput" placeholder="Buscar por chave, email ou observação..." oninput="renderTable()">
      <button class="btn btn-outline btn-sm" onclick="loadLicenses()">↻ Atualizar</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Chave</th>
            <th>Email</th>
            <th>Observação</th>
            <th>Status</th>
            <th>Último uso</th>
            <th>Criada em</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const API_BASE = window.location.origin; // mesmo domínio do Vercel

  let adminPassword = '';
  let licenses = [];

  // ── Login ─────────────────────────────────────────────────────────────────
  async function login() {
    const pass = document.getElementById('loginPass').value;
    if (!pass) return;
    document.getElementById('loginErr').textContent = '';

    const r = await api('list', { password: pass });
    if (r.error === 'Senha incorreta') {
      document.getElementById('loginErr').textContent = '❌ Senha incorreta';
      return;
    }
    adminPassword = pass;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    licenses = r.licenses || [];
    updateStats();
    renderTable();
  }

  function logout() {
    adminPassword = '';
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginPass').value = '';
  }

  // ── API call ──────────────────────────────────────────────────────────────
  async function api(action, extra = {}) {
    try {
      const r = await fetch(`${API_BASE}/api/admin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: adminPassword, action, ...extra })
      });
      return await r.json();
    } catch(e) {
      return { error: e.message };
    }
  }

  // ── Load ──────────────────────────────────────────────────────────────────
  async function loadLicenses() {
    const r = await api('list');
    if (r.error) { showToast(r.error, 'error'); return; }
    licenses = r.licenses || [];
    updateStats();
    renderTable();
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function updateStats() {
    const total    = licenses.length;
    const active   = licenses.filter(l => l.active).length;
    const inactive = total - active;
    document.getElementById('statTotal').textContent    = total;
    document.getElementById('statActive').textContent   = active;
    document.getElementById('statInactive').textContent = inactive;
    document.getElementById('badgeTotal').textContent   = total + ' licença' + (total !== 1 ? 's' : '');
  }

  // ── Render table ──────────────────────────────────────────────────────────
  function renderTable() {
    const q = (document.getElementById('filterInput').value || '').toLowerCase();
    const filtered = q
      ? licenses.filter(l =>
          l.key?.toLowerCase().includes(q) ||
          l.email?.toLowerCase().includes(q) ||
          l.note?.toLowerCase().includes(q)
        )
      : licenses;

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = filtered.map(l => `
      <tr>
        <td class="key-cell">${l.key}</td>
        <td style="color:#aaa">${l.email || '—'}</td>
        <td style="color:#888;font-size:11px">${l.note || '—'}</td>
        <td><span class="badge ${l.active ? 'badge-active' : 'badge-inactive'}">${l.active ? 'ATIVA' : 'INATIVA'}</span></td>
        <td class="date-cell">${l.used_at ? fmtDate(l.used_at) : '—'}</td>
        <td class="date-cell">${fmtDate(l.created_at)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-outline btn-sm" onclick="copyKey('${l.key}')">Copiar</button>
            <button class="btn btn-outline btn-sm" onclick="toggleLicense('${l.key}')">${l.active ? 'Desativar' : 'Ativar'}</button>
            <button class="btn btn-outline btn-sm" style="color:#ff4444;border-color:#440000" onclick="deleteLicense('${l.key}')">✕</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── Create ────────────────────────────────────────────────────────────────
  async function createLicenses() {
    const qty   = parseInt(document.getElementById('createQty').value)  || 1;
    const email = document.getElementById('createEmail').value.trim();
    const note  = document.getElementById('createNote').value.trim();
    const r = await api('create', { quantity: qty, email, note });
    if (r.error) { showToast(r.error, 'error'); return; }
    showToast(`✅ ${r.created.length} chave(s) gerada(s)!`, 'success');
    await loadLicenses();
  }

  // ── Toggle ────────────────────────────────────────────────────────────────
  async function toggleLicense(key) {
    const r = await api('toggle', { key });
    if (r.error) { showToast(r.error, 'error'); return; }
    showToast(r.active ? '✅ Licença ativada' : '🚫 Licença desativada', r.active ? 'success' : 'error');
    await loadLicenses();
  }

  // ── Delete ────────────────────────────────────────────────────────────────
  async function deleteLicense(key) {
    if (!confirm(`Deletar a licença ${key}?`)) return;
    const r = await api('delete', { key });
    if (r.error) { showToast(r.error, 'error'); return; }
    showToast('🗑 Licença deletada', 'error');
    await loadLicenses();
  }

  // ── Copy ──────────────────────────────────────────────────────────────────
  function copyKey(key) {
    navigator.clipboard.writeText(key);
    showToast('📋 Chave copiada!', 'success');
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type === 'success' ? ' success' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }
</script>
</body>
</html>
