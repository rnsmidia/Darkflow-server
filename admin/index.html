<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CenaDrop — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg:       #080810;
    --surface:  #0f0f1c;
    --card:     #13131f;
    --border:   #1e1e30;
    --accent:   #7c6fff;
    --accent2:  #ff6f91;
    --green:    #4ade80;
    --red:      #f87171;
    --yellow:   #fbbf24;
    --text:     #e8e8f0;
    --muted:    #555570;
    --subtle:   #2a2a40;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* ── LOGIN ─────────────────────────────────────────────── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .login-logo { font-size: 32px; font-weight: 800; margin-bottom: 6px; }
  .login-logo span { color: var(--accent); }
  .login-sub { color: var(--muted); font-size: 14px; margin-bottom: 36px; }
  .login-card input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .login-card input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .85; }
  .login-error { color: var(--red); font-size: 13px; margin-top: 12px; }

  /* ── APP ───────────────────────────────────────────────── */
  #app { display: none; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-logo { font-size: 20px; font-weight: 800; }
  .topbar-logo span { color: var(--accent); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .badge-live {
    background: rgba(74,222,128,.12);
    color: var(--green);
    border: 1px solid rgba(74,222,128,.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .btn-logout {
    background: var(--subtle);
    color: var(--muted);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: color .2s;
  }
  .btn-logout:hover { color: var(--text); }

  /* ── STATS ─────────────────────────────────────────────── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    padding: 28px 32px 0;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
  }
  .stat-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 800; line-height: 1; }
  .stat-value.green { color: var(--green); }
  .stat-value.red   { color: var(--red); }
  .stat-value.acc   { color: var(--accent); }
  .stat-value.yel   { color: var(--yellow); }

  /* ── TABS ──────────────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 24px 32px 0;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 22px;
    border-radius: 10px 10px 0 0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
    transition: all .2s;
    font-family: 'Syne', sans-serif;
    position: relative;
    bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--text);
    background: var(--card);
    border-color: var(--border);
    border-bottom-color: var(--card);
  }
  .tab-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 6px;
  }

  /* ── PANELS ────────────────────────────────────────────── */
  .panel { display: none; padding: 28px 32px; }
  .panel.active { display: block; }

  /* ── TOOLBAR ───────────────────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    opacity: .5;
  }
  .btn-sm {
    background: var(--subtle);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-sm.accent:hover { opacity: .85; }

  /* ── TABLE ─────────────────────────────────────────────── */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface);
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(124,111,255,.04); }
  td { padding: 13px 16px; font-size: 14px; vertical-align: middle; }

  .key-mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    background: rgba(124,111,255,.1);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
  }
  .key-mono:hover { background: rgba(124,111,255,.2); }
  .key-mono::after { content: ' 📋'; font-size: 11px; opacity: .6; }

  .badge {
    display: inline-block;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .badge.active   { background: rgba(74,222,128,.12); color: var(--green); border: 1px solid rgba(74,222,128,.3); }
  .badge.inactive { background: rgba(248,113,113,.12); color: var(--red);   border: 1px solid rgba(248,113,113,.3); }
  .badge.hotmart  { background: rgba(251,191,36,.12);  color: var(--yellow);border: 1px solid rgba(251,191,36,.3); }
  .badge.manual   { background: rgba(124,111,255,.12); color: var(--accent);border: 1px solid rgba(124,111,255,.3); }

  .actions { display: flex; gap: 6px; }
  .btn-icon {
    background: var(--subtle);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 13px;
    transition: all .15s;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
  }
  .btn-icon:hover { border-color: var(--accent); }
  .btn-icon.danger:hover { border-color: var(--red); color: var(--red); }
  .btn-icon.warn:hover   { border-color: var(--yellow); color: var(--yellow); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── MODAL ─────────────────────────────────────────────── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    width: 100%;
    max-width: 460px;
    padding: 32px;
  }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 22px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
  .field input, .field textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .modal-actions button { flex: 1; }

  /* ── TOAST ─────────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 14px;
    color: var(--text);
    opacity: 0;
    transform: translateY(10px);
    transition: all .3s;
    z-index: 9999;
    pointer-events: none;
    max-width: 320px;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error   { border-color: var(--red);   color: var(--red); }

  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  @media (max-width: 700px) {
    .topbar, .stats-row, .panel { padding-left: 16px; padding-right: 16px; }
    .tabs { padding-left: 16px; }
    td:nth-child(4), th:nth-child(4),
    td:nth-child(5), th:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Cena<span>Drop</span></div>
    <div class="login-sub">Painel Administrativo</div>
    <input type="password" id="pw-input" placeholder="Senha de acesso" />
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Cena<span>Drop</span> <span style="color:var(--muted);font-size:13px;font-weight:400;">Admin</span></div>
    <div class="topbar-right">
      <span class="badge-live">● Live</span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value acc" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Ativas</div><div class="stat-value green" id="s-active">—</div></div>
    <div class="stat-card"><div class="stat-label">Inativas</div><div class="stat-value red" id="s-inactive">—</div></div>
    <div class="stat-card"><div class="stat-label">Via Hotmart</div><div class="stat-value yel" id="s-hotmart">—</div></div>
    <div class="stat-card"><div class="stat-label">Manual</div><div class="stat-value" id="s-manual">—</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('licenses')">🔑 Licenças <span class="tab-badge" id="tab-count-lic">0</span></button>
    <button class="tab" onclick="switchTab('students')">🎓 Alunos Hotmart <span class="tab-badge" id="tab-count-hot">0</span></button>
  </div>

  <!-- LICENÇAS -->
  <div class="panel active" id="panel-licenses">
    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search-lic" placeholder="Buscar por chave, email ou nome..." oninput="filterLicenses()" />
      </div>
      <button class="btn-sm accent" onclick="openCreateModal()">+ Nova Chave</button>
      <button class="btn-sm" onclick="loadAll()">↻ Atualizar</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Chave</th>
            <th>Nome / Email</th>
            <th>Status</th>
            <th>Origem</th>
            <th>Data</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lic-tbody"><tr><td colspan="6"><div class="loading">Carregando...</div></td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ALUNOS HOTMART -->
  <div class="panel" id="panel-students">
    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search-hot" placeholder="Buscar por nome, email ou WhatsApp..." oninput="filterStudents()" />
      </div>
      <button class="btn-sm" onclick="loadAll()">↻ Atualizar</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>WhatsApp</th>
            <th>Chave</th>
            <th>Status</th>
            <th>Data</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="hot-tbody"><tr><td colspan="7"><div class="loading">Carregando...</div></td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL CRIAR/EDITAR -->
<div class="overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modal-title">Nova Chave</h2>
    <div class="field"><label>Nome (opcional)</label><input type="text" id="m-name" placeholder="Ex: João Silva" /></div>
    <div class="field"><label>Email (opcional)</label><input type="email" id="m-email" placeholder="joao@email.com" /></div>
    <div class="field"><label>WhatsApp (opcional)</label><input type="text" id="m-phone" placeholder="(11) 99999-9999" /></div>
    <div class="field"><label>Observações</label><textarea id="m-notes" placeholder="Notas internas..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn-sm accent" id="modal-confirm" onclick="confirmModal()">Criar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  const API = '/api/admin';
  let TOKEN = '';
  let allLicenses = [];
  let modalMode = 'create';
  let editingKey = '';

  // ── AUTH ────────────────────────────────────────────────
  function doLogin() {
    const pw = document.getElementById('pw-input').value;
    fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', password: pw })
    }).then(r => r.json()).then(d => {
      if (d.ok) {
        TOKEN = pw;
        sessionStorage.setItem('cd_token', pw);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadAll();
      } else {
        document.getElementById('login-err').textContent = 'Senha incorreta.';
      }
    }).catch(() => {
      document.getElementById('login-err').textContent = 'Erro de conexão.';
    });
  }

  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function logout() {
    sessionStorage.removeItem('cd_token');
    location.reload();
  }

  // Auto-login se token salvo
  const saved = sessionStorage.getItem('cd_token');
  if (saved) { TOKEN = saved; doAutoLogin(); }

  async function doAutoLogin() {
    try {
      const r = await apiCall('stats');
      if (r.total !== undefined) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadAll();
      }
    } catch { sessionStorage.removeItem('cd_token'); }
  }

  // ── API ─────────────────────────────────────────────────
  async function apiCall(action, extra = {}) {
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
      body: JSON.stringify({ action, password: TOKEN, ...extra })
    });
    return r.json();
  }

  // ── LOAD ─────────────────────────────────────────────────
  async function loadAll() {
    const [licData, statsData] = await Promise.all([
      apiCall('list'),
      apiCall('stats')
    ]);

    if (statsData.total !== undefined) {
      document.getElementById('s-total').textContent   = statsData.total;
      document.getElementById('s-active').textContent  = statsData.active;
      document.getElementById('s-inactive').textContent= statsData.inactive;
      document.getElementById('s-hotmart').textContent = statsData.hotmart;
      document.getElementById('s-manual').textContent  = statsData.manual;
    }

    if (licData.licenses) {
      allLicenses = licData.licenses;
      document.getElementById('tab-count-lic').textContent = allLicenses.length;
      const hotmart = allLicenses.filter(l => l.source === 'hotmart');
      document.getElementById('tab-count-hot').textContent = hotmart.length;
      renderLicenses(allLicenses);
      renderStudents(hotmart);
    }
  }

  // ── RENDER LICENÇAS ──────────────────────────────────────
  function renderLicenses(list) {
    const tbody = document.getElementById('lic-tbody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="icon">🔑</div><p>Nenhuma licença encontrada.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(l => `
      <tr>
        <td><span class="key-mono" title="Clique para copiar" onclick="copyKey('${l.key}')">${l.key}</span></td>
        <td>
          <div style="font-weight:600;font-size:13px">${l.name || '<span style="color:var(--muted)">—</span>'}</div>
          <div style="color:var(--muted);font-size:12px">${l.email || ''}</div>
        </td>
        <td><span class="badge ${l.status}">${l.status === 'active' ? 'Ativa' : 'Inativa'}</span></td>
        <td><span class="badge ${l.source || 'manual'}">${l.source === 'hotmart' ? 'Hotmart' : 'Manual'}</span></td>
        <td style="color:var(--muted);font-size:12px">${formatDate(l.created_at)}</td>
        <td>
          <div class="actions">
            <button class="btn-icon" title="Editar" onclick="openEditModal('${l.key}')">✏️</button>
            <button class="btn-icon warn" title="${l.status === 'active' ? 'Desativar' : 'Ativar'}" onclick="toggleKey('${l.key}')">${l.status === 'active' ? '🔒' : '🔓'}</button>
            <button class="btn-icon warn" title="Gerar nova chave" onclick="regenKey('${l.key}')">🔄</button>
            <button class="btn-icon danger" title="Excluir" onclick="deleteKey('${l.key}')">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── RENDER ALUNOS ────────────────────────────────────────
  function renderStudents(list) {
    const tbody = document.getElementById('hot-tbody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">🎓</div><p>Nenhum aluno via Hotmart ainda.<br><span style="font-size:12px;color:var(--muted)">Configure o webhook da Hotmart para que os alunos apareçam aqui automaticamente.</span></p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(l => `
      <tr>
        <td style="font-weight:600">${l.name || '—'}</td>
        <td style="color:var(--muted);font-size:13px">${l.email || '—'}</td>
        <td style="font-size:13px">${l.phone ? `<a href="https://wa.me/55${l.phone.replace(/\D/g,'')}" target="_blank" style="color:var(--green);text-decoration:none">📱 ${l.phone}</a>` : '<span style="color:var(--muted)">—</span>'}</td>
        <td><span class="key-mono" onclick="copyKey('${l.key}')">${l.key}</span></td>
        <td><span class="badge ${l.status}">${l.status === 'active' ? 'Ativa' : 'Inativa'}</span></td>
        <td style="color:var(--muted);font-size:12px">${formatDate(l.created_at)}</td>
        <td>
          <div class="actions">
            <button class="btn-icon warn" onclick="toggleKey('${l.key}')">${l.status === 'active' ? '🔒 Bloquear' : '🔓 Ativar'}</button>
            <button class="btn-icon warn" onclick="regenKey('${l.key}')" title="Nova chave">🔄</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── FILTROS ──────────────────────────────────────────────
  function filterLicenses() {
    const q = document.getElementById('search-lic').value.toLowerCase();
    const filtered = allLicenses.filter(l =>
      (l.key||'').toLowerCase().includes(q) ||
      (l.email||'').toLowerCase().includes(q) ||
      (l.name||'').toLowerCase().includes(q)
    );
    renderLicenses(filtered);
  }

  function filterStudents() {
    const q = document.getElementById('search-hot').value.toLowerCase();
    const filtered = allLicenses.filter(l => l.source === 'hotmart').filter(l =>
      (l.name||'').toLowerCase().includes(q) ||
      (l.email||'').toLowerCase().includes(q) ||
      (l.phone||'').toLowerCase().includes(q)
    );
    renderStudents(filtered);
  }

  // ── TABS ─────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (tab === 'licenses' ? 0 : 1)));
    document.getElementById('panel-licenses').classList.toggle('active', tab === 'licenses');
    document.getElementById('panel-students').classList.toggle('active', tab === 'students');
  }

  // ── MODAL ─────────────────────────────────────────────────
  function openCreateModal() {
    modalMode = 'create';
    editingKey = '';
    document.getElementById('modal-title').textContent = '+ Nova Chave';
    document.getElementById('modal-confirm').textContent = 'Criar';
    document.getElementById('m-name').value = '';
    document.getElementById('m-email').value = '';
    document.getElementById('m-phone').value = '';
    document.getElementById('m-notes').value = '';
    document.getElementById('modal-overlay').classList.add('open');
  }

  function openEditModal(key) {
    const lic = allLicenses.find(l => l.key === key);
    if (!lic) return;
    modalMode = 'edit';
    editingKey = key;
    document.getElementById('modal-title').textContent = '✏️ Editar Licença';
    document.getElementById('modal-confirm').textContent = 'Salvar';
    document.getElementById('m-name').value  = lic.name  || '';
    document.getElementById('m-email').value = lic.email || '';
    document.getElementById('m-phone').value = lic.phone || '';
    document.getElementById('m-notes').value = lic.notes || '';
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('open');
    }
  }

  async function confirmModal() {
    const name  = document.getElementById('m-name').value.trim();
    const email = document.getElementById('m-email').value.trim();
    const phone = document.getElementById('m-phone').value.trim();
    const notes = document.getElementById('m-notes').value.trim();

    if (modalMode === 'create') {
      const d = await apiCall('create', { name, email, phone, notes });
      if (d.ok) {
        toast(`✅ Chave criada: ${d.license.key}`, 'success');
        closeModal();
        loadAll();
      } else {
        toast('Erro ao criar chave', 'error');
      }
    } else {
      const d = await apiCall('update', { key: editingKey, name, email, phone, notes });
      if (d.ok) {
        toast('✅ Atualizado', 'success');
        closeModal();
        loadAll();
      } else {
        toast('Erro ao atualizar', 'error');
      }
    }
  }

  // ── AÇÕES ────────────────────────────────────────────────
  async function toggleKey(key) {
    const d = await apiCall('toggle', { key });
    if (d.ok) {
      toast(`${d.status === 'active' ? '🔓 Ativada' : '🔒 Bloqueada'}`, 'success');
      loadAll();
    }
  }

  async function regenKey(key) {
    if (!confirm('Gerar uma nova chave? A chave anterior deixará de funcionar.')) return;
    const d = await apiCall('regenkey', { key });
    if (d.ok) {
      toast(`🔄 Nova chave: ${d.newKey}`, 'success');
      loadAll();
    }
  }

  async function deleteKey(key) {
    if (!confirm(`Excluir permanentemente a chave ${key}?`)) return;
    const d = await apiCall('delete', { key });
    if (d.ok) {
      toast('🗑️ Chave excluída', 'success');
      loadAll();
    }
  }

  function copyKey(key) {
    navigator.clipboard.writeText(key).then(() => toast('📋 Chave copiada!', 'success'));
  }

  // ── UTILS ────────────────────────────────────────────────
  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  let toastTimer;
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }
</script>
</body>
</html>
